name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install Dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Build and Type Check
        working-directory: frontend/web
        run: npm run build


  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - vendor-management
          - contract-management
          - search
          - notification
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles(format('services/{0}/composer.lock', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        working-directory: services/${{ matrix.service }}
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Tests
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/phpunit


  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: Setup .env file
        run: cp .env.example .env
        continue-on-error: true

      - name: Start Docker Compose Stack
        run: docker-compose up -d --build

      - name: Install Frontend Dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend/web
        run: npx playwright install --with-deps

      - name: Wait for Services to become ready
        run: npx wait-on tcp:localhost:5001 tcp:localhost:8001 tcp:localhost:8002 tcp:localhost:8003 tcp:localhost:8004 --timeout 120000

      - name: Run Playwright Tests
        working-directory: frontend/web
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/web/playwright-report/
          retention-days: 30
