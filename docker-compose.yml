services:

  # ── Databases ──────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shared-capstone-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-capstone-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - shared-capstone-network

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shared-capstone-network

  # ── Laravel Services ───────────────────────────
  vendor-management:
    build: ./services/vendor-management
    volumes:
      - ./services/vendor-management:/var/www/html
      - vendor-management-vendor:/var/www/html/vendor
    ports:
      - "8001:8000"
    command: sh -c "composer install --no-scripts && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  contract-management:
    build: ./services/contract-management
    volumes:
      - ./services/contract-management:/var/www/html
      - contract-management-vendor:/var/www/html/vendor
    ports:
      - "8002:8000"
    command: sh -c "composer install --no-scripts && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - CLAMD_HOST=clamav
      - CLAMD_PORT=3310
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
    networks:
      - shared-capstone-network

  search:
    build: ./services/search
    volumes:
      - ./services/search:/var/www/html
      - search-vendor:/var/www/html/vendor
    ports:
      - "8003:8000"
    command: sh -c "composer install --no-scripts && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      elasticsearch:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - shared-capstone-network

  notification:
    build: ./services/notification
    volumes:
      - ./services/notification:/var/www/html
      - notification-vendor:/var/www/html/vendor
    ports:
      - "8004:8000"
    command: sh -c "composer install --no-scripts && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  # ── ClamAV Antivirus Daemon ──────────────────────
  clamav:
    image: clamav/clamav:1.4_base
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_MILTERD=true
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - shared-capstone-network

  # ── Vue Frontend ───────────────────────────────
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend/web:/app
      - web-node-modules:/app/node_modules
    container_name: crms-web
    expose:
      - "5001"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5001"
    networks:
      - shared-capstone-network

networks:
  shared-capstone-network:
    external: true

volumes:
  mysql_data:
  mongo_data:
  es_data:
  vendor-management-vendor:
  contract-management-vendor:
  search-vendor:
  notification-vendor:
  web-node-modules:
  clamav_db:
