services:

  # ── Databases ──────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    networks:
      - shared-capstone-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-capstone-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - shared-capstone-network

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shared-capstone-network

  # ── Laravel Services ───────────────────────────
  vendor-management:
    build: ./services/vendor-management
    volumes:
      - ./services/vendor-management:/var/www/html
    ports:
      - "8001:8000"
    command: sh -c "export COMPOSER_PROCESS_TIMEOUT=2000 && composer config --global process-timeout 2000 && composer install --no-scripts && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      - mysql
      - mongodb
      - redis
    networks:
      - shared-capstone-network

  contract-management:
    build: ./services/contract-management
    volumes:
      - ./services/contract-management:/var/www/html
    ports:
      - "8002:8000"
    command: sh -c "export COMPOSER_PROCESS_TIMEOUT=2000 && composer config --global process-timeout 2000 && composer install --no-scripts && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      - mysql
      - mongodb
      - redis
    networks:
      - shared-capstone-network

  search:
    build: ./services/search
    volumes:
      - ./services/search:/var/www/html
    ports:
      - "8003:8000"
    command: sh -c "if [ ! -d vendor ]; then export COMPOSER_PROCESS_TIMEOUT=2000 && composer config --global process-timeout 2000 && composer install --no-scripts; fi && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - elasticsearch
    networks:
      - shared-capstone-network

  notification:
    build: ./services/notification
    volumes:
      - ./services/notification:/var/www/html
    ports:
      - "8004:8000"
    command: sh -c "if [ ! -d vendor ]; then export COMPOSER_PROCESS_TIMEOUT=2000 && composer config --global process-timeout 2000 && composer install --no-scripts; fi && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - mysql
      - redis
    networks:
      - shared-capstone-network

  # ── Vue Frontend ───────────────────────────────
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    container_name: crms-web
    expose:
      - "5001"
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5001"
    networks:
      - shared-capstone-network

networks:
  shared-capstone-network:
    external: true

volumes:
  mysql_data:
  mongo_data:
  es_data:
