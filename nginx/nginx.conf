server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        proxy_pass http://cms-web-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vendor Management API
    location /api/vendor/ {
        rewrite ^/api/vendor/(.*)$ /api/$1 break;
        proxy_pass http://cms-vendor-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Contract Management API
    location /api/contract/ {
        rewrite ^/api/contract/(.*)$ /api/$1 break;
        proxy_pass http://cms-contract-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Search API
    location /api/search/ {
        rewrite ^/api/search/(.*)$ /api/$1 break;
        proxy_pass http://cms-search-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification API
    location /api/notification/ {
        rewrite ^/api/notification/(.*)$ /api/$1 break;
        proxy_pass http://cms-notification-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
