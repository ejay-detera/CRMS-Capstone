<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS - Contract & Vendor Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="initial-loader-overlay">
        <div class="initial-loader-card">
          <!-- Spinner -->
          <div class="spinner-container">
            <svg class="spinner-ring" viewBox="0 0 56 56" fill="none">
              <circle cx="28" cy="28" r="24" stroke="#252578" stroke-width="4" stroke-opacity="0.12" />
              <path d="M28 4a24 24 0 0 1 24 24" stroke="#252578" stroke-width="4" stroke-linecap="round" />
            </svg>
            <div class="spinner-icon-wrapper">
              <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="#252578" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
              </svg>
            </div>
          </div>
          <!-- Label -->
          <p class="initial-loader-label">Loading CMS...</p>
        </div>
      </div>
      <style>
        body {
          margin: 0;
          padding: 0;
          background-color: #f9fafb;
          font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .initial-loader-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(15, 15, 40, 0.45);
          backdrop-filter: blur(3px);
          -webkit-backdrop-filter: blur(3px);
          z-index: 9999;
        }
        .initial-loader-card {
          background: #ffffff;
          border-radius: 1rem;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
          padding: 1.75rem 2rem;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
          min-width: 180px;
          box-sizing: border-box;
        }
        .spinner-container {
          position: relative;
          width: 3.5rem;
          height: 3.5rem;
        }
        .spinner-ring {
          width: 3.5rem;
          height: 3.5rem;
          animation: spin-initial-loader 1s linear infinite;
        }
        .spinner-icon-wrapper {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .spinner-icon {
          width: 1.25rem;
          height: 1.25rem;
        }
        .initial-loader-label {
          font-size: 0.875rem;
          font-weight: 600;
          color: #252578;
          letter-spacing: 0.05em;
          margin: 0;
          text-align: center;
        }
        @keyframes spin-initial-loader {
          100% {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
