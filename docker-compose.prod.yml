version: '3.8'

services:
  # ── Databases ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cms-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-capstone-network

  redis:
    image: redis:7
    container_name: cms-redis-prod
    restart: always
    networks:
      - shared-capstone-network

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: cms-meilisearch-prod
    restart: always
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme}
      - MEILI_ENV=production
    volumes:
      - meili_data_prod:/meili_data
    networks:
      - shared-capstone-network

  clamav:
    image: clamav/clamav:1.4_base
    container_name: cms-clamav-prod
    restart: always
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_MILTERD=true
    volumes:
      - clamav_db_prod:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - shared-capstone-network

  # ── Backend Services (Laravel) ───────────────────────────
  vendor-management:
    build:
      context: ./services/vendor-management
      dockerfile: Dockerfile.prod
    container_name: cms-vendor-prod
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - AUTH_SERVICE_URL=http://139.59.125.45/api
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  contract-management:
    build:
      context: ./services/contract-management
      dockerfile: Dockerfile.prod
    container_name: cms-contract-prod
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - AUTH_SERVICE_URL=http://139.59.125.45/api
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  contract-queue:
    build:
      context: ./services/contract-management
      dockerfile: Dockerfile.prod
    container_name: cms-contract-queue-prod
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  contract-scheduler:
    build:
      context: ./services/contract-management
      dockerfile: Dockerfile.prod
    container_name: cms-contract-scheduler-prod
    restart: always
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared-capstone-network

  search:
    build:
      context: ./services/search
      dockerfile: Dockerfile.prod
    container_name: cms-search-prod
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILI_MASTER_KEY:-changeme}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      meilisearch:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - shared-capstone-network

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile.prod
    container_name: cms-notification-prod
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - AUTH_SERVICE_URL=http://139.59.125.45/api
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  notification-queue:
    build:
      context: ./services/notification
      dockerfile: Dockerfile.prod
    container_name: cms-notification-queue-prod
    restart: always
    command: php artisan queue:work --queue=default --sleep=3 --tries=3 --timeout=60
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - APP_KEY=${APP_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification/api
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp-relay.brevo.com
      - MAIL_PORT=587
      - MAIL_USERNAME=ada636001@smtp-brevo.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=noreply.cms.notification@gmail.com
      - MAIL_FROM_NAME="CMS Notification"
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  # ── Frontend (Served via Nginx) ───────────────────────────────
  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.prod
    container_name: cms-web-prod
    restart: always
    networks:
      - shared-capstone-network

  # ── API Gateway (Nginx) ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cms-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - vendor-management
      - contract-management
      - search
      - notification
    networks:
      - shared-capstone-network

networks:
  shared-capstone-network:
    external: true

volumes:
  mysql_data_prod:
  meili_data_prod:
  clamav_db_prod:
