services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared-capstone-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - shared-capstone-network

  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - shared-capstone-network

  vendor-management:
    build:
      context: ./services/vendor-management
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: sh -c "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php-fpm -D && nginx -g 'daemon off;'"
    env_file: ./services/vendor-management/.env.production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared-capstone-network

  contract-management:
    build:
      context: ./services/contract-management
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache && php artisan route:cache &&
             php artisan queue:work --sleep=3 --tries=3 --timeout=60 &
             php artisan schedule:work &
             php-fpm -D && nginx -g 'daemon off;'"
    env_file: ./services/contract-management/.env.production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared-capstone-network

  search:
    build:
      context: ./services/search
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: sh -c "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php-fpm -D && nginx -g 'daemon off;'"
    env_file: ./services/search/.env.production
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - shared-capstone-network

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache && php artisan route:cache &&
             php artisan queue:work --queue=default --sleep=3 --tries=3 &
             php-fpm -D && nginx -g 'daemon off;'"
    env_file: ./services/notification/.env.production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shared-capstone-network

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - shared-capstone-network

networks:
  shared-capstone-network:
    external: true

volumes:
  mysql_data:
  meili_data:
  redis_data:
